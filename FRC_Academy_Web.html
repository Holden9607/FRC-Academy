<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRC Basic Code Academy - Web Edition</title>
    <!-- CodeMirror 6 (lightweight, modern editor) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@6.0.1/lib/codemirror.css">
    <script src="https://cdn.jsdelivr.net/npm/codemirror@6.0.1/lib/codemirror.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/codemirror@6.0.1/mode/clike/clike.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #1a1d2e;
            color: #e0e0e0;
            height: 100vh;
            overflow: hidden;
        }
        .app {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        /* Top bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: #1a1d2e;
            border-bottom: 1px solid #2a2e42;
        }
        .btn {
            background-color: #2c3e66;
            color: white;
            font-size: 14px;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            padding: 8px 20px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn:hover {
            background-color: #3e5a8a;
        }
        .btn:active {
            background-color: #1a2a4a;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        /* Main content */
        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
            padding: 15px;
            gap: 15px;
        }
        /* Code editor panel (left) */
        .editor-panel {
            flex: 7;
            background-color: #202433;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #2a2e42;
        }
        .panel-header {
            padding: 10px;
            background-color: #202433;
            border-bottom: 1px solid #2a2e42;
            font-weight: bold;
            color: #ffc857;
        }
        .CodeMirror {
            flex: 1;
            height: auto;
            background-color: #0f111a;
            font-family: 'Consolas', monospace;
            font-size: 13px;
        }
        .editor-actions {
            padding: 10px;
            text-align: right;
            border-top: 1px solid #2a2e42;
        }
        /* Instructions panel (right) */
        .instructions-panel {
            flex: 3;
            background-color: #202433;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            border: 1px solid #2a2e42;
            overflow: hidden;
        }
        .instructions-area {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            background-color: #0f111a;
            font-family: 'Segoe UI', sans-serif;
            font-size: 13px;
            line-height: 1.5;
            white-space: pre-wrap;
        }
        .button-group {
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-top: 1px solid #2a2e42;
        }
        .feedback {
            padding: 5px 15px;
            font-style: italic;
            color: #cccccc;
            background-color: #1a1d2e;
            border-top: 1px solid #2a2e42;
            font-size: 12px;
        }
        /* Modal (hint & solution) */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background-color: #1e1e2e;
            border: 1px solid #2a2e42;
            border-radius: 8px;
            width: 800px;
            max-width: 90%;
            max-height: 80%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .modal-header {
            padding: 10px;
            background-color: #2a2e42;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-body {
            padding: 10px;
            overflow-y: auto;
            background-color: #1e1e2e;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            white-space: pre-wrap;
            line-height: 1.4;
        }
        .modal-footer {
            padding: 10px;
            text-align: right;
            border-top: 1px solid #2a2e42;
        }
        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="top-bar">
        <button id="backBtn" class="btn">← Main Menu</button>
        <button id="librariesBtn" class="btn">Libraries</button>
    </div>
    <div class="main-content">
        <div class="editor-panel">
            <div class="panel-header">Your Code (Edit here)</div>
            <textarea id="codeEditor"></textarea>
            <div class="editor-actions">
                <button id="resetSkeletonBtn" class="btn">Reset Skeleton</button>
            </div>
        </div>
        <div class="instructions-panel">
            <div class="panel-header" id="categoryTitle">Learning Guide</div>
            <div id="instructionsArea" class="instructions-area"></div>
            <div class="button-group">
                <button id="doItMyselfBtn" class="btn">Do It Myself</button>
                <button id="checkBtn" class="btn" disabled>Check My Code</button>
                <button id="hintBtn" class="btn" disabled>Hint</button>
                <button id="solutionBtn" class="btn" disabled>Solution</button>
                <button id="backToGuideBtn" class="btn" style="display: none;">Back to Lesson Guide</button>
            </div>
            <div id="feedbackLabel" class="feedback">Select a lesson and press 'Do It Myself' to start coding.</div>
        </div>
    </div>
</div>

<!-- Modal for hint and solution -->
<div id="modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <span id="modalTitle">Title</span>
            <button class="close-btn" onclick="closeModal()">×</button>
        </div>
        <div id="modalBody" class="modal-body"></div>
        <div class="modal-footer">
            <button class="btn" onclick="closeModal()">Close</button>
        </div>
    </div>
</div>

<script>
    // ---------- State ----------
    let selectedCategory = null;      // "Controllers" or "Motors"
    let selectedMotor = null;         // "NEO" or "Kraken"
    let selectedMotorLesson = null;   // "Define", "Activate", "Tank"
    let normalInstructions = "";
    let editorInitialized = false;
    let editor; // CodeMirror instance

    // DOM elements
    const backBtn = document.getElementById('backBtn');
    const librariesBtn = document.getElementById('librariesBtn');
    const resetSkeletonBtn = document.getElementById('resetSkeletonBtn');
    const doItMyselfBtn = document.getElementById('doItMyselfBtn');
    const checkBtn = document.getElementById('checkBtn');
    const hintBtn = document.getElementById('hintBtn');
    const solutionBtn = document.getElementById('solutionBtn');
    const backToGuideBtn = document.getElementById('backToGuideBtn');
    const categoryTitle = document.getElementById('categoryTitle');
    const instructionsArea = document.getElementById('instructionsArea');
    const feedbackLabel = document.getElementById('feedbackLabel');

    // Helper: show category menu (main)
    function showCategoryMenu() {
        const mainHtml = `
            <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%;">
                <h1 style="color: #ffc857; font-size: 48px;">FRC Basic Code Academy</h1>
                <p style="font-size: 24px; margin: 20px;">Choose a Category</p>
                <div style="display: flex; gap: 30px;">
                    <button class="btn" id="catControllersBtn">Controllers</button>
                    <button class="btn" id="catMotorsBtn">Motors</button>
                </div>
            </div>
        `;
        instructionsArea.innerHTML = mainHtml;
        categoryTitle.innerText = "Main Menu";
        // attach events after DOM update
        document.getElementById('catControllersBtn')?.addEventListener('click', () => {
            selectedCategory = "Controllers";
            showControllersLessonMenu();
        });
        document.getElementById('catMotorsBtn')?.addEventListener('click', () => {
            selectedCategory = "Motors";
            showMotorTypeMenu();
        });
        // disable buttons
        doItMyselfBtn.disabled = true;
        checkBtn.disabled = true;
        hintBtn.disabled = true;
        solutionBtn.disabled = true;
        backToGuideBtn.style.display = 'none';
        if (editor) editor.setValue("// Select a lesson and press 'Do It Myself' to start.");
        feedbackLabel.innerText = "Select a lesson and press 'Do It Myself' to start coding.";
    }

    function showControllersLessonMenu() {
        const html = `
            <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%;">
                <h2 style="color: #ffc857;">Controllers Lesson</h2>
                <p>Learn how to define a CommandXboxController in your robot code.</p>
                <button class="btn" id="startControllerLessonBtn" style="margin: 20px;">Start Controller Lesson</button>
                <button class="btn" id="backToCategoryBtn">← Back to Categories</button>
            </div>
        `;
        instructionsArea.innerHTML = html;
        categoryTitle.innerText = "Select Lesson";
        document.getElementById('startControllerLessonBtn')?.addEventListener('click', () => startControllersLesson());
        document.getElementById('backToCategoryBtn')?.addEventListener('click', () => showCategoryMenu());
    }

    function showMotorTypeMenu() {
        const html = `
            <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%;">
                <h2 style="color: #ffc857;">Select Motor Type</h2>
                <div style="display: flex; gap: 30px; margin: 20px;">
                    <button class="btn" id="neoBtn">NEO Motor (REV)</button>
                    <button class="btn" id="krakenBtn">Kraken Motor (CTRE)</button>
                </div>
                <button class="btn" id="backToCategoryBtn2">← Back to Categories</button>
            </div>
        `;
        instructionsArea.innerHTML = html;
        categoryTitle.innerText = "Select Motor";
        document.getElementById('neoBtn')?.addEventListener('click', () => { selectedMotor = "NEO"; showMotorLessonMenu(); });
        document.getElementById('krakenBtn')?.addEventListener('click', () => { selectedMotor = "Kraken"; showMotorLessonMenu(); });
        document.getElementById('backToCategoryBtn2')?.addEventListener('click', () => showCategoryMenu());
    }

    function showMotorLessonMenu() {
        const html = `
            <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%;">
                <h2 style="color: #ffc857;">Select Motor Lesson</h2>
                <p>Motor: ${selectedMotor}</p>
                <div style="display: flex; flex-direction: column; gap: 15px; margin: 20px;">
                    <button class="btn" id="defineLessonBtn">1. Define a Motor (declare & instantiate)</button>
                    <button class="btn" id="activateLessonBtn">2. Activate a Single Motor (button binding)</button>
                    <button class="btn" id="tankLessonBtn">3. Tank Drive (arcade drive with left stick)</button>
                </div>
                <button class="btn" id="backToMotorTypeBtn">← Back to Motor Types</button>
            </div>
        `;
        instructionsArea.innerHTML = html;
        categoryTitle.innerText = "Select Lesson";
        document.getElementById('defineLessonBtn')?.addEventListener('click', () => { selectedMotorLesson = "Define"; startMotorLesson(); });
        document.getElementById('activateLessonBtn')?.addEventListener('click', () => { selectedMotorLesson = "Activate"; startMotorLesson(); });
        document.getElementById('tankLessonBtn')?.addEventListener('click', () => { selectedMotorLesson = "Tank"; startMotorLesson(); });
        document.getElementById('backToMotorTypeBtn')?.addEventListener('click', () => showMotorTypeMenu());
    }

    function setupTeachingPanel() {
        // Ensure editor is created (once)
        if (!editorInitialized) {
            const textarea = document.getElementById('codeEditor');
            editor = CodeMirror.fromTextArea(textarea, {
                lineNumbers: true,
                mode: "text/x-java",
                theme: "default",
                viewportMargin: Infinity,
                lineWrapping: false
            });
            editor.setValue("// Select a lesson and press 'Do It Myself' to start.");
            editor.setOption("readOnly", true);
            editorInitialized = true;
        }
        // Reset UI to teaching layout
        instructionsArea.innerHTML = ""; // will be filled later
        categoryTitle.innerText = "Learning Guide";
        backToGuideBtn.style.display = 'none';
        doItMyselfBtn.disabled = false;
        checkBtn.disabled = true;
        hintBtn.disabled = true;
        solutionBtn.disabled = true;
        resetSkeletonBtn.disabled = true;
        feedbackLabel.innerText = "Press 'Do It Myself' to start.";
    }

    function startControllersLesson() {
        setupTeachingPanel();
        categoryTitle.innerText = "Controllers | Define Xbox Controllers";
        const solution = getControllersSolution();
        editor.setValue(solution);
        editor.setOption("readOnly", true);
        normalInstructions = buildControllersInstructions();
        instructionsArea.innerText = normalInstructions;
        instructionsArea.scrollTop = 0;
        // Enable Do It Myself, others disabled
        doItMyselfBtn.disabled = false;
        checkBtn.disabled = true;
        hintBtn.disabled = true;
        solutionBtn.disabled = true;
        resetSkeletonBtn.disabled = true;
        backToGuideBtn.style.display = 'none';
        feedbackLabel.innerText = "Press 'Do It Myself' to start coding.";
    }

    function startMotorLesson() {
        setupTeachingPanel();
        let lessonName = "";
        if (selectedMotorLesson === "Define") lessonName = "Define a Motor";
        else if (selectedMotorLesson === "Activate") lessonName = "Activate Single Motor";
        else lessonName = "Tank Drive (Arcade)";
        categoryTitle.innerText = `${selectedMotor} | ${lessonName}`;
        const solution = getMotorSolution();
        editor.setValue(solution);
        editor.setOption("readOnly", true);
        normalInstructions = buildMotorInstructions();
        instructionsArea.innerText = normalInstructions;
        instructionsArea.scrollTop = 0;
        doItMyselfBtn.disabled = false;
        checkBtn.disabled = true;
        hintBtn.disabled = true;
        solutionBtn.disabled = true;
        resetSkeletonBtn.disabled = true;
        backToGuideBtn.style.display = 'none';
    }

    // ----- Lesson content builders (exactly matching JavaFX) -----
    function buildControllersInstructions() {
        return "Controllers Lesson - Defining Xbox Controllers\n\n" +
               "Task: Add two CommandXboxController variables to the Robot class.\n" +
               "Name them:\n" +
               "  - driverController (port 0)\n" +
               "  - operatorController (port 1)\n\n" +
               "You have been given the imports, class declaration, and an empty robotInit() method.\n" +
               "Add the two controller declarations inline (at the top of the class).\n\n" +
               "Example:\n" +
               "private final CommandXboxController driverController = new CommandXboxController(0);\n" +
               "private final CommandXboxController operatorController = new CommandXboxController(1);\n\n" +
               "Press 'Do It Myself', then write the declarations.\n" +
               "Use CHECK, HINT, or SOLUTION.";
    }

    function buildMotorInstructions() {
        const isNEO = selectedMotor === "NEO";
        const motorClass = isNEO ? "SparkMax" : "TalonFX";
        const motorParams = isNEO ? "(1, MotorType.kBrushless)" : "(1, \"DINO\")";
        let sb = selectedMotor + " Motor Lesson - ";
        if (selectedMotorLesson === "Define") sb += "Define a Motor\n\nTask: Declare and instantiate a motor variable inline.\nName: m_motor, CAN ID: 1\n";
        else if (selectedMotorLesson === "Activate") sb += "Activate Single Motor\n\nTask: Add motor declaration and bind operatorController button B.\nThe button should run motor at 0.5 speed when held and stop when released.\n";
        else sb += "Tank Drive\n\nTask: Add left/right motor declarations and implement arcade drive in teleopPeriodic().\nLeft ID 1, Right ID 2.\nUse formulas: forward = -driverController.getLeftY(), turn = driverController.getLeftX(), leftSpeed = forward+turn, rightSpeed = forward-turn, clamp, then set motors.\n";
        sb += "\nExample declarations:\nprivate final " + motorClass + " m_motor = new " + motorClass + motorParams + ";\n";
        sb += "private final CommandXboxController driverController = new CommandXboxController(0);\n";
        sb += "private final CommandXboxController operatorController = new CommandXboxController(1);\n\n";
        sb += "Press 'Do It Myself', then write the missing code.\nUse CHECK, HINT, or SOLUTION.";
        return sb;
    }

    function getControllersSolution() {
        return "import edu.wpi.first.wpilibj.TimedRobot;\n" +
               "import edu.wpi.first.wpilibj2.command.CommandXboxController;\n" +
               "\npublic class Robot extends TimedRobot {\n" +
               "    private final CommandXboxController driverController = new CommandXboxController(0);\n" +
               "    private final CommandXboxController operatorController = new CommandXboxController(1);\n" +
               "\n    @Override\n    public void robotInit() { }\n" +
               "}\n";
    }

    function getMotorSolution() {
        const isNEO = selectedMotor === "NEO";
        const motorClass = isNEO ? "SparkMax" : "TalonFX";
        const motorImport = isNEO ? "import com.revrobotics.spark.SparkMax;" : "import com.ctre.phoenix6.hardware.TalonFX;";
        const controlImport = isNEO ? "" : "import com.ctre.phoenix6.controls.DutyCycleOut;\n";
        const motorParams1 = isNEO ? "(1, MotorType.kBrushless)" : "(1, \"DINO\")";
        const motorParams2 = isNEO ? "(2, MotorType.kBrushless)" : "(2, \"DINO\")";
        let sol = "";
        sol += "import edu.wpi.first.wpilibj.TimedRobot;\n";
        sol += "import edu.wpi.first.wpilibj2.command.CommandXboxController;\n";
        if (selectedMotorLesson === "Activate") {
            sol += "import edu.wpi.first.wpilibj2.command.RunCommand;\n";
            sol += "import edu.wpi.first.wpilibj2.command.InstantCommand;\n";
        } else if (selectedMotorLesson === "Tank") {
            sol += "import edu.wpi.first.math.MathUtil;\n";
        }
        sol += motorImport + "\n";
        if (!isNEO) sol += controlImport;
        if (isNEO && (selectedMotorLesson === "Define" || selectedMotorLesson === "Activate"))
            sol += "import com.revrobotics.spark.SparkLowLevel.MotorType;\n";
        sol += "\npublic class Robot extends TimedRobot {\n";
        if (selectedMotorLesson === "Define") {
            sol += "    private final " + motorClass + " m_motor = new " + motorClass + motorParams1 + ";\n";
        } else if (selectedMotorLesson === "Activate") {
            sol += "    private final " + motorClass + " m_motor = new " + motorClass + motorParams1 + ";\n";
        } else {
            sol += "    private final " + motorClass + " m_leftMotor = new " + motorClass + motorParams1 + ";\n";
            sol += "    private final " + motorClass + " m_rightMotor = new " + motorClass + motorParams2 + ";\n";
        }
        sol += "    private final CommandXboxController driverController = new CommandXboxController(0);\n";
        sol += "    private final CommandXboxController operatorController = new CommandXboxController(1);\n\n";
        if (selectedMotorLesson === "Define") {
            sol += "    @Override\n    public void robotInit() { }\n";
        } else if (selectedMotorLesson === "Activate") {
            sol += "    @Override\n    public void robotInit() {\n";
            sol += "        operatorController.b()\n";
            sol += "            .whileTrue(new RunCommand(() -> {\n";
            if (isNEO) sol += "                m_motor.set(0.5);\n";
            else sol += "                m_motor.setControl(new DutyCycleOut(0.5));\n";
            sol += "            }))\n";
            sol += "            .onFalse(new InstantCommand(() -> {\n";
            if (isNEO) sol += "                m_motor.set(0.0);\n";
            else sol += "                m_motor.setControl(new DutyCycleOut(0.0));\n";
            sol += "            }));\n";
            sol += "    }\n";
        } else {
            sol += "    @Override\n    public void teleopPeriodic() {\n";
            sol += "        double forward = -driverController.getLeftY();\n";
            sol += "        double turn = driverController.getLeftX();\n";
            sol += "        double leftSpeed = forward + turn;\n";
            sol += "        double rightSpeed = forward - turn;\n";
            sol += "        leftSpeed = MathUtil.clamp(leftSpeed, -1.0, 1.0);\n";
            sol += "        rightSpeed = MathUtil.clamp(rightSpeed, -1.0, 1.0);\n";
            if (isNEO) {
                sol += "        m_leftMotor.set(leftSpeed);\n";
                sol += "        m_rightMotor.set(rightSpeed);\n";
            } else {
                sol += "        m_leftMotor.setControl(new DutyCycleOut(leftSpeed));\n";
                sol += "        m_rightMotor.setControl(new DutyCycleOut(rightSpeed));\n";
            }
            sol += "    }\n";
        }
        sol += "}\n";
        return sol;
    }

    function loadSkeletonIntoEditor() {
        if (selectedCategory === "Controllers") {
            editor.setValue(
                "import edu.wpi.first.wpilibj.TimedRobot;\n" +
                "import edu.wpi.first.wpilibj2.command.CommandXboxController;\n" +
                "\npublic class Robot extends TimedRobot {\n" +
                "    // TODO: Add controller declarations here\n" +
                "\n" +
                "    @Override\n" +
                "    public void robotInit() {\n" +
                "        // Nothing needed here for this lesson\n" +
                "    }\n" +
                "}\n"
            );
        } else {
            const isNEO = selectedMotor === "NEO";
            const motorClass = isNEO ? "SparkMax" : "TalonFX";
            const motorImport = isNEO ? "import com.revrobotics.spark.SparkMax;" : "import com.ctre.phoenix6.hardware.TalonFX;";
            const controlImport = isNEO ? "" : "import com.ctre.phoenix6.controls.DutyCycleOut;";
            let skeleton = "";
            skeleton += "import edu.wpi.first.wpilibj.TimedRobot;\n";
            skeleton += "import edu.wpi.first.wpilibj2.command.CommandXboxController;\n";
            if (selectedMotorLesson === "Activate") {
                skeleton += "import edu.wpi.first.wpilibj2.command.RunCommand;\n";
                skeleton += "import edu.wpi.first.wpilibj2.command.InstantCommand;\n";
            } else if (selectedMotorLesson === "Tank") {
                skeleton += "import edu.wpi.first.math.MathUtil;\n";
            }
            skeleton += motorImport + "\n";
            if (!isNEO) skeleton += controlImport + "\n";
            if (isNEO && (selectedMotorLesson === "Define" || selectedMotorLesson === "Activate"))
                skeleton += "import com.revrobotics.spark.SparkLowLevel.MotorType;\n";
            skeleton += "\npublic class Robot extends TimedRobot {\n";
            skeleton += "    // TODO: Add motor declarations (inline) here\n";
            skeleton += "    // TODO: Add controller declarations (inline) here\n\n";
            if (selectedMotorLesson === "Define") {
                skeleton += "    @Override\n    public void robotInit() { }\n";
            } else if (selectedMotorLesson === "Activate") {
                skeleton += "    @Override\n    public void robotInit() {\n        // TODO: Bind operatorController button B\n    }\n";
            } else {
                skeleton += "    @Override\n    public void teleopPeriodic() {\n        // TODO: Implement arcade drive\n    }\n";
            }
            skeleton += "}\n";
            editor.setValue(skeleton);
        }
        editor.setOption("readOnly", false);
        feedbackLabel.innerText = "Skeleton loaded. Fill in the missing parts.";
    }

    // ----- Validation (same patterns as JavaFX) -----
    function checkCode() {
        const code = editor.getValue();
        let correct = false;
        if (selectedCategory === "Controllers") {
            if (code.includes("CommandXboxController driverController = new CommandXboxController(0)") &&
                code.includes("CommandXboxController operatorController = new CommandXboxController(1)")) {
                correct = true;
            }
        } else {
            const isNEO = selectedMotor === "NEO";
            const motorClass = isNEO ? "SparkMax" : "TalonFX";
            const requiredImport = isNEO ? "import com.revrobotics.spark.SparkMax;" : "import com.ctre.phoenix6.hardware.TalonFX;";
            if (!code.includes(requiredImport)) correct = false;
            else if (selectedMotorLesson === "Define") {
                if (code.includes("private final " + motorClass + " m_motor = new " + motorClass + "(") &&
                    code.includes("CommandXboxController driverController") && code.includes("CommandXboxController operatorController")) {
                    correct = true;
                }
            } else if (selectedMotorLesson === "Activate") {
                if (code.includes("private final " + motorClass + " m_motor") &&
                    code.includes("operatorController.b()") && code.includes("whileTrue") && code.includes("onFalse")) {
                    correct = true;
                }
            } else if (selectedMotorLesson === "Tank") {
                if (code.includes("private final " + motorClass + " m_leftMotor") && code.includes("private final " + motorClass + " m_rightMotor") &&
                    code.includes("teleopPeriodic") && code.includes("getLeftY") && code.includes("getLeftX") && code.includes("MathUtil.clamp")) {
                    correct = true;
                }
            }
        }
        const result = correct ? "CORRECT! Good job!" : "INCORRECT. Please review the lesson and try again.";
        alert(result);
        feedbackLabel.innerText = "Check complete: " + result;
    }

    // ----- Hint popup (identical content) -----
    function showHintPopup() {
        let msg = "";
        if (selectedCategory === "Controllers") {
            msg = "Add these lines at the top of the Robot class:\n\n" +
                  "private final CommandXboxController driverController = new CommandXboxController(0);\n" +
                  "private final CommandXboxController operatorController = new CommandXboxController(1);";
        } else {
            const isNEO = selectedMotor === "NEO";
            const motorClass = isNEO ? "SparkMax" : "TalonFX";
            const motorParams1 = isNEO ? "(1, MotorType.kBrushless)" : "(1, \"DINO\")";
            const motorParams2 = isNEO ? "(2, MotorType.kBrushless)" : "(2, \"DINO\")";
            if (selectedMotorLesson === "Define") {
                msg = "Add this line at the top:\n";
                msg += "private final " + motorClass + " m_motor = new " + motorClass + motorParams1 + ";\n";
            } else if (selectedMotorLesson === "Activate") {
                msg = "Add motor declaration and button binding:\n\n";
                msg += "private final " + motorClass + " m_motor = new " + motorClass + motorParams1 + ";\n";
                msg += "private final CommandXboxController driverController = new CommandXboxController(0);\n";
                msg += "private final CommandXboxController operatorController = new CommandXboxController(1);\n\n";
                msg += "@Override\npublic void robotInit() {\n";
                msg += "    operatorController.b()\n";
                msg += "        .whileTrue(new RunCommand(() -> {\n";
                msg += "            " + (isNEO ? "m_motor.set(0.5);" : "m_motor.setControl(new DutyCycleOut(0.5));") + "\n";
                msg += "        }))\n";
                msg += "        .onFalse(new InstantCommand(() -> {\n";
                msg += "            " + (isNEO ? "m_motor.set(0.0);" : "m_motor.setControl(new DutyCycleOut(0.0));") + "\n";
                msg += "        }));\n";
                msg += "}\n";
            } else {
                msg = "Add motor declarations and arcade drive:\n\n";
                msg += "private final " + motorClass + " m_leftMotor = new " + motorClass + motorParams1 + ";\n";
                msg += "private final " + motorClass + " m_rightMotor = new " + motorClass + motorParams2 + ";\n";
                msg += "private final CommandXboxController driverController = new CommandXboxController(0);\n";
                msg += "private final CommandXboxController operatorController = new CommandXboxController(1);\n\n";
                msg += "@Override\npublic void teleopPeriodic() {\n";
                msg += "    double forward = -driverController.getLeftY();\n";
                msg += "    double turn = driverController.getLeftX();\n";
                msg += "    double leftSpeed = forward + turn;\n";
                msg += "    double rightSpeed = forward - turn;\n";
                msg += "    leftSpeed = MathUtil.clamp(leftSpeed, -1.0, 1.0);\n";
                msg += "    rightSpeed = MathUtil.clamp(rightSpeed, -1.0, 1.0);\n";
                if (isNEO) {
                    msg += "    m_leftMotor.set(leftSpeed);\n";
                    msg += "    m_rightMotor.set(rightSpeed);\n";
                } else {
                    msg += "    m_leftMotor.setControl(new DutyCycleOut(leftSpeed));\n";
                    msg += "    m_rightMotor.setControl(new DutyCycleOut(rightSpeed));\n";
                }
                msg += "}\n";
            }
        }
        document.getElementById('modalTitle').innerText = "Hint";
        document.getElementById('modalBody').innerHTML = "<pre style='white-space: pre-wrap;'>" + escapeHtml(msg) + "</pre>";
        document.getElementById('modal').style.display = 'flex';
    }

    function showSolutionPopup() {
        const userCode = editor.getValue();
        const solution = (selectedCategory === "Controllers") ? getControllersSolution() : getMotorSolution();
        const isNEO = selectedCategory === "Motors" && selectedMotor === "NEO";
        const userLines = userCode.split(/\r?\n/);
        const solLines = solution.split(/\r?\n/);
        let html = "<div style='font-family: Consolas, monospace; font-size: 12px;'>";
        for (let solLine of solLines) {
            let trimmed = solLine.trim();
            let userHasLine = false;
            for (let userLine of userLines) {
                if (userLine.trim() === trimmed) {
                    userHasLine = true;
                    break;
                }
            }
            if (!userHasLine) {
                if (trimmed.includes("import") && trimmed.includes(isNEO ? "SparkMax" : "TalonFX")) {
                    for (let ul of userLines) if (ul.includes("import") && ul.includes(isNEO ? "SparkMax" : "TalonFX")) userHasLine = true;
                } else if (trimmed.includes("driverController") || trimmed.includes("operatorController")) {
                    for (let ul of userLines) if (ul.includes("driverController") || ul.includes("operatorController")) userHasLine = true;
                } else if (trimmed.includes("new CommandXboxController(0)") || trimmed.includes("new CommandXboxController(1)")) {
                    for (let ul of userLines) if (ul.includes("new CommandXboxController(0)") || ul.includes("new CommandXboxController(1)")) userHasLine = true;
                } else if (trimmed.includes("new " + (isNEO ? "SparkMax" : "TalonFX") + "(")) {
                    for (let ul of userLines) if (ul.includes("new " + (isNEO ? "SparkMax" : "TalonFX") + "(")) userHasLine = true;
                } else if (selectedCategory === "Controllers") {
                    if (trimmed.includes("private final CommandXboxController")) {
                        for (let ul of userLines) if (ul.includes("private final CommandXboxController")) userHasLine = true;
                    }
                } else if (selectedMotorLesson === "Define") {
                    if (trimmed.includes("private final " + (isNEO ? "SparkMax" : "TalonFX"))) {
                        for (let ul of userLines) if (ul.includes("private final " + (isNEO ? "SparkMax" : "TalonFX"))) userHasLine = true;
                    }
                } else if (selectedMotorLesson === "Activate") {
                    if (trimmed.includes("whileTrue") || trimmed.includes("onFalse")) {
                        for (let ul of userLines) if (ul.includes("whileTrue") || ul.includes("onFalse")) userHasLine = true;
                    } else if (trimmed.includes(".set(0.5)") || trimmed.includes(".set(0.0)") || trimmed.includes("setControl(new DutyCycleOut")) {
                        for (let ul of userLines) if (ul.includes(".set(0.5)") || ul.includes(".set(0.0)") || ul.includes("setControl(new DutyCycleOut"))) userHasLine = true;
                    }
                } else if (selectedMotorLesson === "Tank") {
                    if (trimmed.includes("teleopPeriodic")) {
                        for (let ul of userLines) if (ul.includes("teleopPeriodic")) userHasLine = true;
                    } else if (trimmed.includes("getLeftY") || trimmed.includes("getLeftX")) {
                        for (let ul of userLines) if (ul.includes("getLeftY") || ul.includes("getLeftX")) userHasLine = true;
                    } else if (trimmed.includes("leftSpeed") || trimmed.includes("rightSpeed")) {
                        for (let ul of userLines) if (ul.includes("leftSpeed") || ul.includes("rightSpeed")) userHasLine = true;
                    } else if (trimmed.includes("MathUtil.clamp")) {
                        for (let ul of userLines) if (ul.includes("MathUtil.clamp")) userHasLine = true;
                    } else if (trimmed.includes(".set") || trimmed.includes("setControl")) {
                        for (let ul of userLines) if (ul.includes(".set") || ul.includes("setControl")) userHasLine = true;
                    }
                }
            }
            let color;
            if (solLine.trim().startsWith("//")) color = "#ffff99";
            else if (userHasLine) color = "#90ee90";
            else color = "#ff9999";
            html += `<div style="color: ${color};">${escapeHtml(solLine)}</div>`;
        }
        html += "</div>";
        document.getElementById('modalTitle').innerText = "Complete Solution - Color Coded";
        document.getElementById('modalBody').innerHTML = html;
        document.getElementById('modal').style.display = 'flex';
    }

    function showLibrariesPopup() {
        const libs = "Common FRC Libraries:\n\n" +
                     "WPILib (built-in):\n  - edu.wpi.first.wpilibj.* (TimedRobot)\n  - edu.wpi.first.wpilibj2.command.* (CommandXboxController, RunCommand, InstantCommand)\n\n" +
                     "CTRE Phoenix (Kraken, Falcon):\n  - com.ctre.phoenix6.hardware.TalonFX\n  - com.ctre.phoenix6.controls.DutyCycleOut\n\n" +
                     "REV Robotics (NEO, NEO 550):\n  - com.revrobotics.spark.SparkMax\n  - com.revrobotics.spark.SparkLowLevel.MotorType\n\n" +
                     "Other:\n  - edu.wpi.first.math.MathUtil (for clamping)";
        alert(libs);
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
    }

    // Event listeners
    backBtn.addEventListener('click', () => showCategoryMenu());
    librariesBtn.addEventListener('click', showLibrariesPopup);
    doItMyselfBtn.addEventListener('click', () => {
        loadSkeletonIntoEditor();
        doItMyselfBtn.disabled = true;
        checkBtn.disabled = false;
        hintBtn.disabled = false;
        solutionBtn.disabled = false;
        resetSkeletonBtn.disabled = false;
        backToGuideBtn.style.display = 'inline-block';
        feedbackLabel.innerText = "Now fill in the missing parts. Use CHECK, HINT, or SOLUTION.";
    });
    checkBtn.addEventListener('click', checkCode);
    hintBtn.addEventListener('click', showHintPopup);
    solutionBtn.addEventListener('click', showSolutionPopup);
    resetSkeletonBtn.addEventListener('click', () => {
        if (!editor.isReadOnly()) loadSkeletonIntoEditor();
        else alert("Press 'Do It Myself' first to start editing.");
    });
    backToGuideBtn.addEventListener('click', () => {
        instructionsArea.innerText = normalInstructions;
        instructionsArea.scrollTop = 0;
        backToGuideBtn.style.display = 'none';
    });

    // Initialize
    showCategoryMenu();
</script>
